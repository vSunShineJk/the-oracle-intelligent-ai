<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --user-bg:   #1f6feb;
      --sys-bg:    #21262d;
      --accent:    #58a6ff;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
    }

    header .title {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.3px;
    }

    header .badge {
      margin-left: auto;
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    /* ── Messages ────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message.user  { align-self: flex-end; align-items: flex-end; max-width: 68%; }
    .message.system { align-self: flex-start; align-items: flex-start; max-width: 92%; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      word-break: break-word;
    }

    .message.user  .bubble { background: var(--user-bg); border-bottom-right-radius: 3px; }
    .message.system .bubble { background: var(--sys-bg); border-bottom-left-radius: 3px; border: 1px solid var(--border); font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }

    .meta {
      font-size: 11px;
      color: var(--muted);
      font-family: "SF Mono", "Fira Code", monospace;
    }

    /* typing indicator */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
    }

    .typing .bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .typing .bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing .bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1); }
    }

    .trace {
      align-self: flex-start;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: var(--muted);
      padding: 1px 0;
      border-left: 2px solid var(--border);
      padding-left: 8px;
      white-space: pre;
    }

    .trace.trace-total {
      color: var(--accent);
      border-left-color: var(--accent);
      margin-top: 2px;
    }

    /* ── Input area ──────────────────────────────── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      padding: 10px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 140px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--muted); }

    #send {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0d1117;
      font-weight: 600;
      font-size: 13px;
      padding: 10px 18px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
      height: 40px;
    }

    #send:hover   { opacity: 0.85; }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <header>
    <div class="dot"></div>
    <span class="title">Platform</span>
    <span class="badge">developer · text</span>
  </header>

  <div id="messages"></div>

  <footer>
    <textarea id="input" rows="1" placeholder="Enter a request…"></textarea>
    <button id="send">Send</button>
  </footer>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("input");
    const sendBtn    = document.getElementById("send");

    const socket = io('http://localhost:5000');

    function timestamp() {
      return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function appendMessage(role, text) {
      const wrap   = document.createElement("div");
      wrap.className = `message ${role === 'user' ? 'user' : 'system'}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.style.whiteSpace = "pre-wrap";
      bubble.textContent = text;

      const meta   = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `${role === "user" ? "you" : "assistant"} · ${timestamp()}`;

      wrap.appendChild(bubble);
      wrap.appendChild(meta);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const wrap = document.createElement("div");
      wrap.id = "typing-indicator";
      wrap.className = "message system typing";
      wrap.innerHTML = `<div class="bubble"><span></span><span></span><span></span></div>`;
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById("typing-indicator");
      if (el) el.remove();
    }

    // all messages come through the socket — voice and typed
    socket.on('new_message', function(data) {
      hideTyping();
      if (data.role === 'assistant') {
        document.querySelectorAll('.trace.trace-step').forEach(el => el.remove());
      }
      appendMessage(data.role, data.text);
    });

    socket.on('trace', function(data) {
      const el = document.createElement("div");
      el.className = data.final ? "trace trace-total" : "trace trace-step";
      el.textContent = data.text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;
      showTyping();

      try {
        await fetch('http://localhost:5000/chat', {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text })
        });
      } catch(e) {
        hideTyping();
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = inputEl.scrollHeight + "px";
    });

    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    sendBtn.addEventListener("click", send);
  </script>

</body>
</html>
